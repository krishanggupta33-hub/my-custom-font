<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typeface Speed Runner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>My Custom Font Runner</h1>
            <div class="stats">
                <div class="time">Time: <span id="time">60</span>s</div>
                <div class="wpm">WPM: <span id="wpm">0</span></div>
            </div>
        </header>

        <input type="text" id="mobile-input" class="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

        <div id="word-display" class="word-display"></div>

        <button id="restart-btn">Restart Game</button>

        <div id="results-modal" class="hidden">
            <h2>Test Complete</h2>
            <div class="results-grid">
                <div class="result-box">
                    <span class="result-label">WPM</span>
                    <span id="final-wpm" class="result-value">0</span>
                </div>
                <div class="result-box">
                    <span class="result-label">Accuracy</span>
                    <span id="final-accuracy" class="result-value">0%</span>
                </div>
                <div class="result-box">
                    <span class="result-label">High Score</span>
                    <span id="high-score" class="result-value">0</span>
                </div>
            </div>
            <button id="play-again-btn">Play Again</button>
        </div>
    </div>

    <div class="creator-credit">by Krishang Gupta</div>

    <script src="script.js"></script>
</body>
</html>
